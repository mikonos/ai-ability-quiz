  <style>
    :root {
      --ink: #11130f;
      --paper: #f7f6ef;
      --paper-2: #ffffff;
      --line: rgba(17, 19, 15, .14);
      --muted: #666b5e;
      --green: #a5ff3f;
      --blue: #2f8cff;
      --coral: #ff695c;
      --yellow: #ffd84d;
      --violet: #8c6bff;
      --shadow: 0 18px 50px rgba(17, 19, 15, .16);
      color: var(--ink);
      background: var(--paper);
      font-family: "Avenir Next", "Gill Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        linear-gradient(90deg, rgba(17, 19, 15, .045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(17, 19, 15, .045) 1px, transparent 1px),
        radial-gradient(circle at 12% 8%, rgba(165, 255, 63, .48), transparent 24%),
        radial-gradient(circle at 88% 6%, rgba(47, 140, 255, .2), transparent 26%),
        linear-gradient(135deg, #f9f7ee 0%, #eff3ea 100%);
      background-size: 28px 28px, 28px 28px, auto, auto, auto;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
    }

    .app {
      width: min(960px, 100%);
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border: 2px solid var(--ink);
      border-radius: 11px;
      background:
        linear-gradient(135deg, var(--green) 0 48%, var(--yellow) 48% 62%, var(--blue) 62% 100%);
      box-shadow: 4px 4px 0 var(--ink);
      transform: rotate(-4deg);
      flex: 0 0 auto;
    }

    .brand-title {
      margin: 0;
      font-size: 18px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .status-pill {
      min-width: 86px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .72);
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(14px);
    }

    .stage {
      display: grid;
      align-items: stretch;
    }

    .screen {
      display: none;
      min-height: 0;
    }

    .screen.active {
      display: grid;
      align-content: center;
      gap: 18px;
    }

    .hero {
      display: grid;
      gap: 20px;
      padding: 22px 0 8px;
    }

    .hero-main {
      display: grid;
      gap: 14px;
    }

    .hero-kicker,
    .section-kicker {
      width: fit-content;
      padding: 7px 10px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--green);
      box-shadow: 3px 3px 0 var(--ink);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .challenge-badge {
      width: fit-content;
      padding: 8px 12px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--coral);
      color: #fff;
      box-shadow: 4px 4px 0 var(--ink);
      font-size: 14px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: 0;
      transform: rotate(-2deg);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      max-width: 760px;
      font-size: clamp(44px, 13vw, 96px);
      line-height: .86;
      font-weight: 950;
      letter-spacing: 0;
    }

    .hero-copy {
      max-width: 610px;
      color: #363930;
      font-size: clamp(16px, 4.2vw, 22px);
      line-height: 1.5;
      font-weight: 650;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric-tile {
      min-height: 86px;
      padding: 12px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: var(--paper-2);
      box-shadow: 4px 4px 0 var(--ink);
    }

    .metric-tile strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      font-weight: 950;
    }

    .metric-tile span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      font-weight: 700;
    }

    .metric-tile:nth-child(2) { background: #dff0ff; }
    .metric-tile:nth-child(3) { background: #fff0b7; }

    .primary-action,
    .secondary-action,
    .ghost-action {
      min-height: 52px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      padding: 13px 18px;
      cursor: pointer;
      font-weight: 900;
      letter-spacing: 0;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
      touch-action: manipulation;
    }

    .primary-action:focus-visible,
    .secondary-action:focus-visible,
    .ghost-action:focus-visible,
    .choice:focus-visible,
    summary:focus-visible {
      outline: 3px solid var(--blue);
      outline-offset: 4px;
    }

    .primary-action:disabled,
    .secondary-action:disabled,
    .ghost-action:disabled {
      cursor: not-allowed;
      opacity: .52;
      transform: none;
      box-shadow: 3px 3px 0 rgba(17, 19, 15, .25);
    }

    .primary-action {
      background: var(--ink);
      color: #fff;
      box-shadow: 5px 5px 0 var(--green);
    }

    .secondary-action {
      background: var(--green);
      color: var(--ink);
      box-shadow: 5px 5px 0 var(--ink);
    }

    .ghost-action {
      background: rgba(255, 255, 255, .68);
      color: var(--ink);
      box-shadow: 4px 4px 0 rgba(17, 19, 15, .28);
    }

    .primary-action:active,
    .secondary-action:active,
    .ghost-action:active,
    .choice:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--ink);
    }

    .hero-actions,
    .result-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .quiz-shell {
      display: grid;
      gap: 14px;
      align-content: start;
      padding-bottom: 8px;
    }

    .progress-wrap {
      display: grid;
      gap: 8px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .progress-track {
      height: 13px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      overflow: hidden;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--blue), var(--coral));
      transition: width .24s ease;
    }

    .question-panel {
      display: grid;
      gap: 16px;
      padding: 18px;
      border: 2px solid var(--ink);
      border-radius: 12px;
      background: rgba(255, 255, 255, .86);
      box-shadow: var(--shadow), 6px 6px 0 var(--ink);
    }

    .question-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .dimension-chip {
      max-width: 52%;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f4f4ef;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .question-title {
      font-size: clamp(23px, 7vw, 40px);
      line-height: 1.08;
      font-weight: 950;
      letter-spacing: 0;
    }

    .question-context {
      color: #40443a;
      font-size: 15px;
      line-height: 1.55;
      font-weight: 650;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .choice {
      width: 100%;
      min-height: 66px;
      padding: 13px 14px;
      border: 2px solid var(--ink);
      border-radius: 9px;
      background: #fff;
      box-shadow: 4px 4px 0 rgba(17, 19, 15, .2);
      cursor: pointer;
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      gap: 12px;
      text-align: left;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .choice:hover {
      background: #f8ffe9;
    }

    .choice[aria-checked="true"] {
      background: #edffd0;
      box-shadow: 2px 2px 0 var(--ink);
      transform: translate(2px, 2px);
    }

    .choice-key {
      width: 34px;
      height: 34px;
      border: 2px solid var(--ink);
      border-radius: 50%;
      background: var(--yellow);
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 950;
    }

    .choice-text {
      font-size: 15px;
      line-height: 1.42;
      font-weight: 750;
    }

    .micro-feedback {
      min-height: 46px;
      padding: 12px 14px;
      border: 1px dashed rgba(17, 19, 15, .38);
      border-radius: 9px;
      color: #3d4437;
      background: rgba(165, 255, 63, .14);
      font-size: 14px;
      line-height: 1.45;
      font-weight: 700;
    }

    .quiz-actions {
      display: grid;
      grid-template-columns: minmax(0, .82fr) minmax(0, 1.18fr);
      gap: 10px;
    }

    .result-layout {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .result-card {
      position: relative;
      overflow: hidden;
      padding: 18px;
      border: 2px solid var(--ink);
      border-radius: 12px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .92), rgba(245, 251, 231, .94)),
        linear-gradient(90deg, rgba(17, 19, 15, .045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(17, 19, 15, .045) 1px, transparent 1px);
      background-size: auto, 22px 22px, 22px 22px;
      box-shadow: var(--shadow), 6px 6px 0 var(--ink);
    }

    .result-card::before {
      content: "";
      position: absolute;
      width: 140px;
      height: 140px;
      right: -42px;
      top: -42px;
      border: 2px solid var(--ink);
      border-radius: 50%;
      background: var(--coral);
      opacity: .92;
    }

    .result-header,
    .score-row,
    .bars,
    .review-panel,
    .advice-list,
    .share-preview {
      position: relative;
      z-index: 1;
    }

    .result-header {
      display: grid;
      gap: 10px;
      padding-right: 56px;
    }

    .sample-badge,
    .style-chip {
      width: fit-content;
      padding: 7px 10px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--yellow);
      color: var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      font-size: 12px;
      line-height: 1;
      font-weight: 950;
    }

    .result-type {
      font-size: clamp(34px, 10vw, 66px);
      line-height: .92;
      font-weight: 950;
      letter-spacing: 0;
    }

    .result-summary {
      color: #353a31;
      font-size: 15px;
      line-height: 1.55;
      font-weight: 700;
    }

    .score-row {
      display: grid;
      grid-template-columns: .95fr 1.4fr;
      gap: 12px;
      margin-top: 16px;
      align-items: stretch;
    }

    .score-box,
    .persona-box {
      padding: 13px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: #fff;
      box-shadow: 4px 4px 0 rgba(17, 19, 15, .18);
    }

    .score-box strong {
      display: block;
      font-size: 46px;
      line-height: 1;
      font-weight: 950;
    }

    .score-box span,
    .persona-box span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 800;
    }

    .persona-box strong {
      display: block;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 950;
    }

    .persona-box .style-chip {
      margin-top: 12px;
      background: #dff0ff;
      box-shadow: none;
    }

    .result-quick-actions {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .bars {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .bar-item {
      display: grid;
      grid-template-columns: 86px 1fr 34px;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 900;
    }

    .bar-track {
      height: 12px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0;
      background: var(--green);
    }

    .bar-item:nth-child(2) .bar-fill { background: var(--blue); }
    .bar-item:nth-child(3) .bar-fill { background: var(--coral); }
    .bar-item:nth-child(4) .bar-fill { background: var(--yellow); }
    .bar-item:nth-child(5) .bar-fill { background: var(--violet); }
    .bar-item:nth-child(6) .bar-fill { background: #31d7a9; }

    .review-panel {
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 2px solid var(--ink);
      border-radius: 12px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .92), rgba(239, 247, 255, .92)),
        linear-gradient(90deg, rgba(17, 19, 15, .04) 1px, transparent 1px),
        linear-gradient(0deg, rgba(17, 19, 15, .04) 1px, transparent 1px);
      background-size: auto, 22px 22px, 22px 22px;
      box-shadow: var(--shadow), 6px 6px 0 var(--ink);
    }

    .review-head {
      display: grid;
      gap: 10px;
    }

    .review-head .section-kicker {
      background: var(--blue);
      color: #fff;
    }

    .review-head h3 {
      margin: 10px 0 0;
      font-size: clamp(28px, 8vw, 48px);
      line-height: .96;
      font-weight: 950;
      letter-spacing: 0;
    }

    .review-head p {
      color: #353a31;
      font-size: 14px;
      line-height: 1.55;
      font-weight: 750;
    }

    .review-list {
      display: grid;
      gap: 12px;
    }

    .review-item {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 2px solid var(--ink);
      border-radius: 9px;
      background: rgba(255, 255, 255, .88);
      box-shadow: 4px 4px 0 rgba(17, 19, 15, .16);
    }

    .review-item-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .review-round {
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .review-score {
      flex: 0 0 auto;
      padding: 6px 9px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--yellow);
      font-size: 12px;
      line-height: 1;
      font-weight: 950;
      box-shadow: 2px 2px 0 var(--ink);
    }

    .review-question {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 950;
    }

    .review-choice {
      display: grid;
      gap: 6px;
      padding: 10px 11px;
      border-left: 5px solid var(--ink);
      background: rgba(165, 255, 63, .16);
      color: #34382f;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 760;
    }

    .review-choice.best {
      background: rgba(47, 140, 255, .12);
      border-left-color: var(--blue);
    }

    .review-choice strong {
      color: var(--ink);
      font-weight: 950;
    }

    .review-empty {
      padding: 14px;
      border: 2px dashed rgba(17, 19, 15, .34);
      border-radius: 9px;
      background: rgba(255, 255, 255, .7);
      color: #34382f;
      font-size: 14px;
      line-height: 1.5;
      font-weight: 760;
    }

    .advice-list {
      display: grid;
      gap: 8px;
      margin-top: 18px;
    }

    .advice {
      padding: 11px 12px;
      border-left: 5px solid var(--ink);
      background: rgba(255, 255, 255, .74);
      color: #34382f;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 720;
    }

    .scoring-note {
      position: relative;
      z-index: 1;
      margin-top: 16px;
      border: 2px solid var(--ink);
      border-radius: 9px;
      background: rgba(255, 255, 255, .78);
      box-shadow: 4px 4px 0 rgba(17, 19, 15, .18);
      overflow: hidden;
    }

    .scoring-note summary {
      cursor: pointer;
      padding: 13px 14px;
      font-weight: 950;
      list-style-position: inside;
    }

    .scoring-body {
      display: grid;
      gap: 12px;
      padding: 0 14px 14px;
      color: #34382f;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 700;
    }

    .scoring-body ul {
      margin: 0;
      padding-left: 20px;
    }

    .answer-review {
      display: grid;
      gap: 8px;
    }

    .answer-review-item {
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .72);
    }

    .answer-review-item strong {
      display: block;
      margin-bottom: 4px;
      color: var(--ink);
    }

    .compact-action {
      min-height: 44px;
      padding: 10px 14px;
      justify-self: start;
    }

    .share-preview {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .share-preview canvas {
      width: min(260px, 100%);
      aspect-ratio: 3 / 4;
      border: 2px solid var(--ink);
      border-radius: 10px;
      background: #fff;
      box-shadow: 5px 5px 0 var(--ink);
      justify-self: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(16px);
      max-width: min(360px, calc(100vw - 32px));
      padding: 11px 14px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      box-shadow: 5px 5px 0 var(--green);
      font-size: 13px;
      font-weight: 850;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 20;
      text-align: center;
    }

    .toast.show {

      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 760px) {
      .app {
        padding: 28px 28px 38px;

      .question-panel,
      .result-card,

      }

      .review-panel {

      }

      .share-preview {

        grid-row: 1 / span 2;
        margin-top: 0;

        top: 28px;
      }

      .result-actions {

      }
    }

    @media (max-width: 370px) {
      .app { padding-left: 12px; padding-right: 12px; }
      .brand-title { font-size: 16px; }
      .status-pill { min-width: 72px; padding-inline: 8px; }

    @media (prefers-reduced-motion: reduce) {

      *::after {

        transition-duration: .001ms !important;

    const SITE_URL = "https://www.au-rion.com/";
    const TRACKING_ENDPOINT = "https://ocny7n2gjwys.aiforce.cloud/app/app_179kdfk3fxn/api/event";

    const dimensions = {

      prompt: "提问方式",
      research: "查资料",
      judgment: "结果判断",
      workflow: "流程搭建",
      risk: "风险意识"

    const questions = [
      {
        dim: "framing",
        title: "明早要交一份竞品判断，只够看 3 家。老板真正想知道：这个打法要不要跟？你第一步怎么用 AI？",
        context: "难点不是让 AI 快点写，而是先把含糊任务变成能拍板的问题。",
        options: [
          { text: "先让 AI 出一套分析框架和几个初步判断，再用 3 家公开资料快速填进去。", scores: { framing: 1, prompt: 1, research: 1 }, style: "apprentice", feedback: "能启动，但框架可能只是通用模板，不一定能回答“要不要跟”。" },
          { text: "先把问题改成 2 句可拍板的话：跟不跟、为什么；再写清哪些证据够用、哪些问题今天先不查。", scores: { framing: 3, prompt: 2, judgment: 1 }, style: "director", feedback: "这是先把任务说清楚，再让 AI 去补证据。" },
          { text: "先收集官网、定价页、案例页，让 AI 归纳三家共同打法和差异打法。", scores: { research: 2, prompt: 1 }, style: "explorer", feedback: "归纳会有用，但还缺一个能让老板拍板的问题。" },
          { text: "先做一页草稿：暂定结论、支持证据、证据缺口、需要老板确认的取舍。", scores: { framing: 2, workflow: 1, risk: 1 }, style: "operator", feedback: "这是成熟的半成品思维：先把不确定的地方摆出来。" }
        ]
      },
      {
        dim: "prompt",
        title: "80 页 PDF 里混着旧数据、广告话术和真洞察。你要压成一页给老板，怎么问 AI？",
        context: "长文档不是只做摘要，更要分清事实、观点、话术和过期数据。",
        options: [
          { text: "按章节总结，每章保留页码和关键数字，再合并成一页。", scores: { prompt: 2, research: 1 }, style: "apprentice", feedback: "比纯摘要可靠，但还没判断旧数据是否仍可引用。" },
          { text: "先做证据表：事实、观点、宣传话术、过期数据、页码分开列；旧数据要写清还能不能用。", scores: { prompt: 3, research: 2, judgment: 2 }, style: "director", feedback: "这是给长文档加证据纪律：先分级，再下结论。" },
          { text: "先让 AI 抽 10 个反直觉结论，再逐条补页码、数字和图表来源。", scores: { research: 2, prompt: 1 }, style: "explorer", feedback: "很像高手动作，但顺序错了：先挑结论容易带偏证据。" },
          { text: "让两个模型分别总结和挑错，保留双方都认可且有引用的结论。", scores: { prompt: 1, judgment: 2, workflow: 1 }, style: "detective", feedback: "双模型能抓部分错，但不能替代证据分级。" }

      },
      {
        dim: "research",

    function safeToken(value, fallback = "") {
      return String(value || fallback).replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 80);
    }

    function createId(prefix) {
      const randomPart = crypto.getRandomValues(new Uint32Array(2));
      return `${prefix}_${Date.now().toString(36)}_${Array.from(randomPart).map((item) => item.toString(36)).join("")}`;
    }

    function getOrCreateVisitorId() {
      const key = "aiAbilityVisitorId";
      const current = safeToken(localStorage.getItem(key));
      if (current) return current;
      const next = createId("v");
      localStorage.setItem(key, next);
      return next;
    }

    const query = new URLSearchParams(window.location.search);
    const trackingContext = {
      visitorId: getOrCreateVisitorId(),
      sessionId: createId("sess"),
      referrerId: safeToken(query.get("ref")),
      inboundShareId: safeToken(query.get("sid")),
      source: safeToken(query.get("src") || query.get("utm_source") || "direct", "direct"),
      utmMedium: safeToken(query.get("utm_medium")),
      utmCampaign: safeToken(query.get("utm_campaign")),
      schemaVersion: safeToken(query.get("v") || "1", "1"),
      sourceResult: safeToken(query.get("r")),
      landingUrl: window.location.href,
      documentReferrer: document.referrer || "",
      language: navigator.language || "",
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
      screenSize: `${window.screen.width}x${window.screen.height}`
    };

    function ensureShareId() {
      if (!state.shareId) state.shareId = createId("share");
      return state.shareId;
    }

    function buildShareUrl(resultId) {
      const url = new URL(SITE_URL);
      const shareId = ensureShareId();
      url.searchParams.set("ref", shareId);
      url.searchParams.set("sid", shareId);
      url.searchParams.set("utm_source", "share_card");
      url.searchParams.set("utm_medium", "qr");
      url.searchParams.set("utm_campaign", "ai_ability_quiz");
      url.searchParams.set("r", resultId);
      url.searchParams.set("v", "1");
      return url.toString();
    }

    function trackEvent(type, details = {}) {
      const event = {
        eventId: createId("evt"),
        eventType: type,
        occurredAt: new Date().toISOString(),
        ...trackingContext,
        ...details
      };
      if (!TRACKING_ENDPOINT) {
        console.debug("[ai-ability-quiz:event]", event);
        return;
      }
      const body = JSON.stringify(event);
      const blob = new Blob([body], { type: "text/plain;charset=UTF-8" });
      if (navigator.sendBeacon) {
        navigator.sendBeacon(TRACKING_ENDPOINT, blob);
        return;
      }
      fetch(TRACKING_ENDPOINT, {
        method: "POST",
        body: blob,
        keepalive: true,
        mode: "cors"
      }).catch(() => {});
    }

    function showScreen(screen) {
      [els.startScreen, els.quizScreen, els.resultScreen].forEach((item) => item.classList.remove("active"));
      screen.classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetState() {
      state.index = 0;
      state.answers = [];
      state.scores = Object.fromEntries(Object.keys(dimensions).map((key) => [key, 0]));
      state.style = {};
      state.isSample = false;
      state.shareId = "";
    }

    function recomputeScores() {
      state.scores = Object.fromEntries(Object.keys(dimensions).map((key) => [key, 0]));
      state.style = {};
      state.answers.forEach((option) => {
        if (!option) return;
        Object.entries(option.scores).forEach(([key, value]) => {
          state.scores[key] += value;
        });
        state.style[option.style] = (state.style[option.style] || 0) + 1;
      });
    }

    function startQuiz() {
      resetState();
      els.statusPill.textContent = "LIVE";
      trackEvent("quiz_start");
      showScreen(els.quizScreen);
      renderQuestion();
    }

    function renderQuestion() {
      const question = questions[state.index];
      const progress = (state.index + 1) / questions.length;
      const selectedOption = state.answers[state.index];
      els.progressText.textContent = `第 ${state.index + 1} / ${questions.length} 题`;
      els.paceText.textContent = "";
      els.progressBar.style.width = `${Math.round(progress * 100)}%`;
      els.progressTrack.setAttribute("aria-valuenow", String(Math.round(progress * 100)));
      els.questionCode.textContent = `ROUND ${String(state.index + 1).padStart(2, "0")}`;
      els.dimensionChip.textContent = dimensions[question.dim];
      els.questionTitle.textContent = question.title;
      els.microFeedback.textContent = selectedOption ? "已选择。继续下一题，最后一起看解析。" : "选一个最像你真实反应的动作。";
      els.choices.innerHTML = "";
      question.options.forEach((option, optionIndex) => {
        const button = document.createElement("button");
        button.className = "choice";
        button.type = "button";
        button.setAttribute("role", "radio");
        button.setAttribute("aria-checked", option === selectedOption ? "true" : "false");
        button.setAttribute("aria-describedby", "microFeedback");
        button.innerHTML = `<span class="choice-key">${"ABCD"[optionIndex]}</span><span class="choice-text">${option.text}</span>`;
        button.addEventListener("click", () => chooseOption(option));
        els.choices.appendChild(button);
      });
      updateQuestionControls();
      window.requestAnimationFrame(() => els.questionTitle.focus({ preventScroll: true }));
    }

    function chooseOption(option) {
      state.answers[state.index] = option;
      recomputeScores();
      els.microFeedback.textContent = "已选择。继续下一题，最后一起看解析。";
      const question = questions[state.index];
      [...els.choices.querySelectorAll("button")].forEach((button, index) => {
        button.setAttribute("aria-checked", question.options[index] === option ? "true" : "false");
      });
      updateQuestionControls();
      els.nextBtn.focus();
    }

    function updateQuestionControls() {
      const hasAnswer = Boolean(state.answers[state.index]);
      els.prevBtn.disabled = state.index === 0;
      els.nextBtn.disabled = !hasAnswer;
      els.nextBtn.textContent = state.index === questions.length - 1 ? "看结果" : "下一题";
      els.paceText.textContent = "";
    }

    function goNext() {
      if (!state.answers[state.index]) {
        showToast("未选择");
        return;
      }
      if (state.index >= questions.length - 1) {
        showResult(false);
        return;
      }
      state.index += 1;
      renderQuestion();
    }

    function goPrev() {
      if (state.index === 0) return;
      state.index -= 1;
      renderQuestion();
    }

    function getMaxScores() {
      return Object.fromEntries(Object.keys(dimensions).map((key) => [
        key,
        questions.reduce((sum, question) => (
          sum + Math.max(...question.options.map((option) => option.scores[key] || 0))
        ), 0)
      ]));
    }

    function getOptionScore(option) {
      return Object.values(option.scores).reduce((sum, value) => sum + value, 0);
    }

    function getMaxRawScore() {
      return questions.reduce((sum, question) => (
        sum + Math.max(...question.options.map((option) => getOptionScore(option)))
      ), 0);
    }

    function getRawScore() {
      return state.answers.reduce((sum, option) => (
        option ? sum + getOptionScore(option) : sum
      ), 0);
    }

    function getBestOption(question) {
      return question.options
        .map((option, index) => ({ option, index, score: getOptionScore(option) }))
        .sort((a, b) => b.score - a.score)[0];
    }

    function getScoreData() {
      const maxScores = getMaxScores();
      const normalized = {};
      Object.keys(dimensions).forEach((key) => {
        normalized[key] = Math.min(100, Math.round((state.scores[key] / (maxScores[key] || 1)) * 100));
      });
      const dimensionAverage = Math.round(Object.values(normalized).reduce((sum, item) => sum + item, 0) / Object.keys(normalized).length);
      const rawScore = getRawScore();
      const maxRawScore = getMaxRawScore();
      const total = state.isSample
        ? dimensionAverage
        : Math.min(100, Math.round((rawScore / (maxRawScore || 1)) * 100));
      const weakest = Object.entries(normalized).sort((a, b) => a[1] - b[1]).slice(0, 3).map(([key]) => key);
      const topStyle = Object.entries(state.style).sort((a, b) => b[1] - a[1])[0]?.[0] || "sprinter";
      const result = resultTypes.find((item) => total >= item.min) || resultTypes[resultTypes.length - 1];
      const shareUrl = state.isSample ? SITE_URL : buildShareUrl(result.id);
      return { normalized, total, rawScore, maxRawScore, weakest, topStyle, result, isSample: state.isSample, shareUrl };
    }

    function showResult(sample = false) {
      if (sample) {
        resetState();
        state.scores = { framing: 8, prompt: 7, research: 6, judgment: 14, workflow: 8, risk: 10 };

    function renderAnswerReview(data) {
      els.reviewList.innerHTML = "";

        els.reviewSummary.textContent = "完成一轮正式测评后，这里会显示 10 道题的选择解析、得分差距和高手做法。";

      questions.forEach((question, questionIndex) => {

          ? "关键是把这个动作迁移到真实工作里：先定决策、证据、边界，再让 AI 加速。"
          : best.option.feedback;
        bestBox.append(bestLabel, bestFeedback);

        item.append(head, title, chosen, bestBox);
        els.reviewList.appendChild(item);
      });
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines = 8) {
      const chars = Array.from(text);
      let line = "";
      let lines = [];
      chars.forEach((char) => {
        const testLine = line + char;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          lines.push(line);
          line = char;
        } else {
          line = testLine;
        }
      });
      if (line) lines.push(line);
      lines = lines.slice(0, maxLines);
      lines.forEach((item, index) => ctx.fillText(item, x, y + index * lineHeight));
      return y + lines.length * lineHeight;
    }

    function roundedRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function drawQrCode(ctx, text, x, y, size) {
      ctx.fillStyle = "#ffffff";
      roundedRect(ctx, x - 12, y - 12, size + 24, size + 24, 24);
      ctx.fill();
      ctx.strokeStyle = "#11130f";
      ctx.lineWidth = 5;
      ctx.stroke();

      if (typeof qrcode !== "function") {
        ctx.fillStyle = "#11130f";
        ctx.font = "800 22px Avenir Next, PingFang SC, sans-serif";
        wrapText(ctx, text, x + 10, y + 52, size - 20, 30, 4);
        return;
      }

      const qr = qrcode(0, "M");
      qr.addData(text);
      qr.make();
      const moduleCount = qr.getModuleCount();
      const quiet = 4;
      const cellSize = size / (moduleCount + quiet * 2);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(x, y, size, size);
      ctx.fillStyle = "#11130f";
      for (let row = 0; row < moduleCount; row += 1) {
        for (let col = 0; col < moduleCount; col += 1) {
          if (!qr.isDark(row, col)) continue;
          const left = Math.round(x + (col + quiet) * cellSize);
          const top = Math.round(y + (row + quiet) * cellSize);
          const right = Math.ceil(x + (col + quiet + 1) * cellSize);
          const bottom = Math.ceil(y + (row + quiet + 1) * cellSize);
          ctx.fillRect(left, top, right - left, bottom - top);
        }
      }
    }

    function drawShareCard(data) {
      const canvas = els.shareCanvas;
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      ctx.fillStyle = "#f7f6ef";
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = "rgba(17,19,15,.09)";
      ctx.lineWidth = 2;
      for (let x = 0; x < w; x += 48) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      for (let y = 0; y < h; y += 48) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      ctx.fillStyle = "#a5ff3f";
      ctx.beginPath();
      ctx.arc(164, 142, 138, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#2f8cff";
      ctx.beginPath();
      ctx.arc(926, 118, 96, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = .22;
      ctx.fillStyle = "#ff695c";
      ctx.beginPath();
      ctx.arc(972, 1304, 124, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      ctx.fillStyle = "#11130f";
      ctx.font = "900 34px Avenir Next, PingFang SC, sans-serif";
      ctx.fillText("AI ABILITY SNAP TEST · 挑战版", 76, 96);
      if (data.isSample) {
        ctx.fillStyle = "#ffd84d";
        roundedRect(ctx, 698, 54, 296, 58, 29);
        ctx.fill();
        ctx.strokeStyle = "#11130f";
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.fillStyle = "#11130f";
        ctx.font = "900 25px Avenir Next, PingFang SC, sans-serif";
        ctx.fillText("示例结果 · 非本人", 730, 92);
      }
      ctx.font = "900 88px Avenir Next, PingFang SC, sans-serif";
      wrapText(ctx, data.result.type, 76, 216, 760, 92, 3);

      ctx.fillStyle = "#ffffff";
      roundedRect(ctx, 76, 474, 928, 246, 28);
      ctx.fill();
      ctx.strokeStyle = "#11130f";
      ctx.lineWidth = 6;
      ctx.stroke();

      ctx.fillStyle = "#11130f";
      ctx.font = "950 120px Avenir Next, PingFang SC, sans-serif";
      ctx.fillText(String(data.total), 118, 622);
      ctx.font = "900 30px Avenir Next, PingFang SC, sans-serif";
      ctx.fillText("/ 100", 306, 616);
      ctx.font = "800 34px Avenir Next, PingFang SC, sans-serif";
      wrapText(ctx, data.result.persona, 474, 564, 450, 42, 2);
      ctx.fillStyle = "#666b5e";
      ctx.font = "700 26px Avenir Next, PingFang SC, sans-serif";
      wrapText(ctx, data.result.note, 474, 636, 438, 34, 2);

      const barStart = 816;
      Object.entries(dimensions).forEach(([key, label], index) => {
        const y = barStart + index * 70;
        const value = data.normalized[key];
        ctx.fillStyle = "#11130f";
        ctx.font = "850 25px Avenir Next, PingFang SC, sans-serif";
        ctx.fillText(label, 76, y);
        ctx.strokeStyle = "#11130f";
        ctx.lineWidth = 4;
        roundedRect(ctx, 246, y - 24, 640, 28, 14);
        ctx.stroke();
        const colors = ["#a5ff3f", "#2f8cff", "#ff695c", "#ffd84d", "#8c6bff", "#31d7a9"];
        const fillWidth = value > 0 ? Math.max(20, (632 * value) / 100) : 0;
        if (fillWidth > 0) {
          ctx.fillStyle = colors[index];
          roundedRect(ctx, 250, y - 20, fillWidth, 20, 10);
          ctx.fill();
        }
        ctx.fillStyle = "#11130f";
        ctx.font = "900 24px Avenir Next, PingFang SC, sans-serif";
        ctx.fillText(String(value), 914, y);
      });

      ctx.fillStyle = "#11130f";
      ctx.font = "900 34px Avenir Next, PingFang SC, sans-serif";
      wrapText(ctx, styleProfiles[data.topStyle] || styleProfiles.sprinter, 76, 1278, 610, 42, 2);

      ctx.fillStyle = "#11130f";
      ctx.font = "800 24px Avenir Next, PingFang SC, sans-serif";
      ctx.fillText("AI 能力快测局 · 2026", 76, 1400);

      ctx.fillStyle = "#11130f";
      ctx.font = "900 25px Avenir Next, PingFang SC, sans-serif";
      drawQrCode(ctx, data.shareUrl, 806, 1190, 176);
      ctx.fillText("扫码测你的 AI 段位", 776, 1410);
    }

    function canvasToBlob(canvas) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error("canvas.toBlob failed"));
        }, "image/png");
      });
    }

    async function downloadShareCard() {
      if (state.isSample) {
        showToast("不可保存");
        return;
      }
      const data = getScoreData();
      drawShareCard(data);
      try {
        const blob = await canvasToBlob(els.shareCanvas);
        const filename = `ai-ability-${data.result.id}-${data.total}.png`;
        const file = new File([blob], filename, { type: "image/png" });
        if (navigator.canShare?.({ files: [file] }) && navigator.share) {
          await navigator.share({
            files: [file],
            title: "AI 能力快测局",
            text: `我的 AI 工作力指数：${data.total}/100`,
            url: data.shareUrl
          });
          trackEvent("native_share_opened", {
            totalScore: data.total,
            resultId: data.result.id,
            shareId: state.shareId,
            shareUrl: data.shareUrl
          });
          showToast("已打开分享");
          return;
        }
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.download = filename;
        link.href = url;
        link.click();
        trackEvent("share_image_saved", {
          totalScore: data.total,
          resultId: data.result.id,
          shareId: state.shareId,
          shareUrl: data.shareUrl
        });
        window.setTimeout(() => URL.revokeObjectURL(url), 1200);
        showToast("已生成");
      } catch (error) {
        showToast("保存失败");
      }
    }

    function showToast(text) {
      els.toast.textContent = text;
      els.toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => els.toast.classList.remove("show"), 2400);
    }

    els.startBtn.addEventListener("click", startQuiz);
    els.prevBtn.addEventListener("click", goPrev);
    els.nextBtn.addEventListener("click", goNext);
    els.restartBtn.addEventListener("click", () => {
      resetState();
      els.statusPill.textContent = "READY";
      els.restartBtn.textContent = "重新测一次";
      showScreen(els.startScreen);
    });
    els.downloadTopBtn.addEventListener("click", downloadShareCard);
    els.downloadBtn.addEventListener("click", downloadShareCard);
    trackEvent(trackingContext.referrerId ? "referral_landing" : "page_view", {
      referred: Boolean(trackingContext.referrerId)
    });
  </script>
</body>
</html>
